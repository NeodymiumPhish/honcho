# Honcho Configuration — Custom for self-hosted deployment
# Ollama Cloud (kimi-k2.5) for all LLM tasks
# Local Ollama (embeddinggemma) for embeddings
#
# Commit this as config.toml in your fork root.
# API keys and base URLs are set via env vars in docker-compose.yml
# so they don't get committed to the repo:
#
#   LLM_OPENAI_COMPATIBLE_API_KEY  → your Ollama Cloud key
#   LLM_OPENAI_COMPATIBLE_BASE_URL → https://api.ollama.ai/v1
#
# The embedding base URL is hardcoded below since it's your
# local LAN address and not a secret.

# ── Application ────────────────────────────────────────────────
[app]
LOG_LEVEL = "INFO"
SESSION_OBSERVERS_LIMIT = 10
GET_CONTEXT_MAX_TOKENS = 100000
MAX_FILE_SIZE = 5242880
MAX_MESSAGE_SIZE = 25000
EMBED_MESSAGES = true
MAX_EMBEDDING_TOKENS = 2048        # embeddinggemma context is 2K
MAX_EMBEDDING_TOKENS_PER_REQUEST = 300000
NAMESPACE = "honcho"

# ── Database ───────────────────────────────────────────────────
# Overridden by DB_CONNECTION_URI env var in docker-compose
[db]
CONNECTION_URI = "postgresql+psycopg://honcho:changeme@database:5432/honcho"
SCHEMA = "public"
POOL_CLASS = "default"
POOL_PRE_PING = true
POOL_SIZE = 10
MAX_OVERFLOW = 20
POOL_TIMEOUT = 30
POOL_RECYCLE = 300
POOL_USE_LIFO = true
SQL_DEBUG = false
TRACING = false

# ── Auth ───────────────────────────────────────────────────────
[auth]
USE_AUTH = false
JWT_SECRET = "not-used"

# ── Sentry ─────────────────────────────────────────────────────
[sentry]
ENABLED = false

# ── LLM ────────────────────────────────────────────────────────
[llm]
DEFAULT_MAX_TOKENS = 2500
MAX_TOOL_OUTPUT_CHARS = 10000
MAX_MESSAGE_CONTENT_CHARS = 2000

# Embeddings — local Ollama on your Windows NAS
EMBEDDING_PROVIDER = "openai_compatible"
EMBEDDING_MODEL = "embeddinggemma"
EMBEDDING_BASE_URL = "http://10.0.0.4:11434/v1"
EMBEDDING_API_KEY = "not-needed"

# API keys set via env vars:
#   LLM_OPENAI_COMPATIBLE_API_KEY
#   LLM_OPENAI_COMPATIBLE_BASE_URL

# ── Deriver ────────────────────────────────────────────────────
[deriver]
ENABLED = true
WORKERS = 1
POLLING_SLEEP_INTERVAL_SECONDS = 1.0
STALE_SESSION_TIMEOUT_MINUTES = 5
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
DEDUPLICATE = true
MAX_OUTPUT_TOKENS = 4096
THINKING_BUDGET_TOKENS = 1024
LOG_OBSERVATIONS = false
MAX_INPUT_TOKENS = 23000
WORKING_REPRESENTATION_MAX_OBSERVATIONS = 100
REPRESENTATION_BATCH_MAX_TOKENS = 1024
FLUSH_ENABLED = false

# ── Peer Card ──────────────────────────────────────────────────
[peer_card]
ENABLED = true

# ── Dialectic ──────────────────────────────────────────────────
[dialectic]
MAX_OUTPUT_TOKENS = 8192
MAX_INPUT_TOKENS = 100000
HISTORY_TOKEN_LIMIT = 8192
SESSION_HISTORY_MAX_TOKENS = 4096

[dialectic.levels.minimal]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 1
MAX_OUTPUT_TOKENS = 250

[dialectic.levels.low]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
THINKING_BUDGET_TOKENS = 0
MAX_TOOL_ITERATIONS = 5

[dialectic.levels.medium]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
THINKING_BUDGET_TOKENS = 1024
MAX_TOOL_ITERATIONS = 2

[dialectic.levels.high]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
THINKING_BUDGET_TOKENS = 1024
MAX_TOOL_ITERATIONS = 4

[dialectic.levels.max]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
THINKING_BUDGET_TOKENS = 2048
MAX_TOOL_ITERATIONS = 10

# ── Summary ────────────────────────────────────────────────────
[summary]
ENABLED = true
MESSAGES_PER_SHORT_SUMMARY = 20
MESSAGES_PER_LONG_SUMMARY = 60
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
MAX_TOKENS_SHORT = 1000
MAX_TOKENS_LONG = 4000
THINKING_BUDGET_TOKENS = 512

# ── Dream ──────────────────────────────────────────────────────
[dream]
ENABLED = true
DOCUMENT_THRESHOLD = 50
IDLE_TIMEOUT_MINUTES = 60
MIN_HOURS_BETWEEN_DREAMS = 8
ENABLED_TYPES = ["omni"]
PROVIDER = "openai_compatible"
MODEL = "kimi-k2.5"
MAX_OUTPUT_TOKENS = 16384
THINKING_BUDGET_TOKENS = 8192
MAX_TOOL_ITERATIONS = 20
HISTORY_TOKEN_LIMIT = 16384

# Specialist models (same provider as main)
DEDUCTION_MODEL = "kimi-k2.5"
INDUCTION_MODEL = "kimi-k2.5"

[dream.surprisal]
ENABLED = false
TREE_TYPE = "kdtree"
TREE_K = 5
SAMPLING_STRATEGY = "recent"
SAMPLE_SIZE = 200
TOP_PERCENT_SURPRISAL = 0.10
MIN_HIGH_SURPRISAL_FOR_REPLACE = 10
INCLUDE_LEVELS = ["explicit", "deductive"]

# ── Webhook ────────────────────────────────────────────────────
[webhook]
SECRET = ""
MAX_WORKSPACE_LIMIT = 10

# ── Metrics ────────────────────────────────────────────────────
[metrics]
ENABLED = false

# ── Telemetry ──────────────────────────────────────────────────
[telemetry]
ENABLED = false
BATCH_SIZE = 100
FLUSH_INTERVAL_SECONDS = 1.0
FLUSH_THRESHOLD = 50
MAX_RETRIES = 3
MAX_BUFFER_SIZE = 10000

# ── Cache ──────────────────────────────────────────────────────
[cache]
ENABLED = true
URL = "redis://redis:6379/0"
DEFAULT_TTL_SECONDS = 300
DEFAULT_LOCK_TTL_SECONDS = 5

# ── Vector Store ───────────────────────────────────────────────
[vector_store]
TYPE = "pgvector"
MIGRATED = false
NAMESPACE = "honcho"
DIMENSIONS = 768              # embeddinggemma outputs 768-dim vectors
LANCEDB_PATH = "./lancedb_data"
RECONCILIATION_INTERVAL_SECONDS = 300
